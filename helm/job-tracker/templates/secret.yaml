# Secret - Kubernetes objekat za čuvanje osjetljivih podataka
# Vrijednosti su base64 enkodovane (nije enkripcija, samo enkodovanje!)
# U produkciji koristimo Sealed Secrets ili Vault
apiVersion: v1
kind: Secret
metadata:
  # Release name dolazi od Helma - npr "job-tracker"
  name: {{ .Release.Name }}-secrets
  labels:
    app: {{ .Release.Name }}
type: Opaque
stringData:
  # stringData automatski enkoduje u base64
  # Vrijednosti dolaze iz values.yaml ili --set pri deployu
  GROQ_API_KEY: {{ .Values.secrets.groqApiKey | quote }}
  TWILIO_ACCOUNT_SID: {{ .Values.secrets.twilioAccountSid | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | quote }}
  WHATSAPP_FROM: {{ .Values.secrets.whatsappFrom | quote }}
  WHATSAPP_TO: {{ .Values.secrets.whatsappTo | quote }}